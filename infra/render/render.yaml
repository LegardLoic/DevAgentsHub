databases:
  - name: devagentshub-postgres
    databaseName: dev_agents_hub
    user: devagentshub
    plan: basic-256mb

services:
  - type: web
    name: devagentshub-api
    env: node
    branch: main
    plan: starter
    autoDeployTrigger: checksPass
    buildCommand: corepack enable && corepack prepare pnpm@10.11.0 --activate && corepack pnpm install --frozen-lockfile && corepack pnpm --filter @devagentshub/api prisma:generate && corepack pnpm --filter @devagentshub/api build
    preDeployCommand: corepack enable && corepack prepare pnpm@10.11.0 --activate && corepack pnpm --filter @devagentshub/api prisma:migrate:deploy
    startCommand: corepack enable && corepack prepare pnpm@10.11.0 --activate && corepack pnpm --filter @devagentshub/api start
    healthCheckPath: /health
    buildFilter:
      paths:
        - apps/api/**
        - packages/**
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - turbo.json
        - tsconfig.base.json
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: devagentshub-postgres
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false

  - type: web
    name: devagentshub-web
    env: node
    branch: main
    plan: starter
    autoDeployTrigger: checksPass
    buildCommand: corepack enable && corepack prepare pnpm@10.11.0 --activate && corepack pnpm install --frozen-lockfile && corepack pnpm --filter @devagentshub/web build
    startCommand: corepack enable && corepack prepare pnpm@10.11.0 --activate && corepack pnpm --filter @devagentshub/web start
    buildFilter:
      paths:
        - apps/web/**
        - packages/**
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - turbo.json
        - tsconfig.base.json
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
