services:
  postgres:
    image: postgres:16-alpine
    container_name: devagentshub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dev_agents_hub
      POSTGRES_USER: devagentshub
      POSTGRES_PASSWORD: devagentshub_password
    ports:
      - '5432:5432'
    volumes:
      - devagentshub_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U devagentshub -d dev_agents_hub']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  devagentshub_postgres_data:
